refresh_rate: 30 seconds
appenders:
  stdout:
    kind: console  
  logfile:
    kind: rolling_file
    path: "logs/dynastio.log"
    encoder:
      kind: json
    policy:
      kind: compound
      trigger:
        kind: size
        limit: 10mb
      roller:
        kind: fixed_window
        base: 1
        count: 20
        pattern: "logs/dynastio.{}.log"    
root:
  level: info
  appenders:
  - stdout