<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор команды Dynast.io</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            background-color: #0d1117; 
            color: #c9d1d9; 
            padding: 40px 20px; 
            max-width: 680px; 
            margin: 0 auto;
        }
        .container {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 32px;
        }
        h2 { 
            margin-top: 0;
            font-size: 24px;
            font-weight: 600;
            color: #f0f6fc;
            border-bottom: 1px solid #30363d;
            padding-bottom: 16px;
        }
        .subtitle {
            color: #8b949e;
            font-size: 14px;
            margin: -8px 0 24px 0;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group { 
            margin-bottom: 8px; 
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-size: 14px;
            font-weight: 400; 
            color: #f0f6fc;
        }
        input { 
            width: 100%; 
            padding: 5px 12px; 
            background-color: #0d1117; 
            border: 1px solid #30363d; 
            color: #c9d1d9; 
            border-radius: 6px; 
            font-size: 14px;
            outline: none;
            line-height: 20px;
        }
        input:focus { 
            border-color: #58a6ff; 
            box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.3);
        }
        .quick-hint {
            font-size: 12px;
            color: #58a6ff;
            margin-top: 4px;
            cursor: pointer;
            display: inline-block;
        }
        .quick-hint:hover {
            text-decoration: underline;
        }
        .submit-btn { 
            background-color: #238636;
            color: #ffffff;
            padding: 6px 16px;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: 500;
            margin-top: 24px;
        }
        .submit-btn:hover { 
            background-color: #2ea043;
        }
        .result-box { 
            margin-top: 24px; 
            background-color: #0d1117; 
            padding: 16px; 
            border-radius: 6px; 
            border: 1px solid #30363d;
        }
        .result-title {
            font-size: 12px;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 8px;
            display: block;
        }
        code { 
            word-break: break-all; 
            white-space: pre-wrap; 
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace; 
            color: #79c0ff; 
            font-size: 12px;
            line-height: 1.6;
            display: block;
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Luminous Generator</h2>
        <div class="subtitle">Конфигуратор строки запуска приватного сервера Dynast.io</div>

        <div class="form-grid">
            <div class="form-group full-width">
                <label for="basePath">Путь к рабочей папке сервера:</label>
                <input type="text" id="basePath" value="C:\dyn_private">
                <span class="quick-hint" onclick="setDefPath()">⚡ Сбросить на стандартный путь (C:\dyn_private)</span>
            </div>

            <div class="form-group full-width">
                <label for="wslPath">Путь к папке карт WSL:</label>
                <input type="text" id="wslPath" value="\\wsl$\Debian\home\user\maps">
            </div>

            <div class="form-group">
                <label for="label">Название сервера (Label):</label>
                <input type="text" id="label" value="BymiNoob">
            </div>

            <div class="form-group">
                <label for="port">Сетевой порт:</label>
                <input type="number" id="port" value="800">
            </div>

            <div class="form-group">
                <label for="map">Игровая карта:</label>
                <input type="text" id="map" value="standard">
            </div>

            <div class="form-group">
                <label for="uid">Идентификатор (UID):</label>
                <input type="text" id="uid" value="google:11111111">
            </div>

            <div class="form-group full-width">
                <label for="pin">Приватный Пин-код (Pin Code):</label>
                <input type="text" id="pin" value="676-767-676">
            </div>
        </div>

        <button class="submit-btn" onclick="generateCommand(true)">Скопировать команду</button>

        <div class="result-box">
            <span class="result-title">Ready Output</span>
            <code id="output">Генерация строки...</code>
        </div>
    </div>

    <script>
        function setDefPath() {
            document.getElementById('basePath').value = "C:\\dyn_private";
            generateCommand(false);
        }

        function generateCommand(isClick) {
            var basePath = document.getElementById('basePath').value.replace(/\/$/, ""); 
            var wslPath = document.getElementById('wslPath').value.replace(/\/$/, "");
            var label = document.getElementById('label').value;
            var port = document.getElementById('port').value;
            var map = document.getElementById('map').value;
            var uid = document.getElementById('uid').value;
            var pin = document.getElementById('pin').value;

            var command = "docker run --rm --name dynast -e DYNASTIO_HETWORK_MODE=host -e DYNASTIO_MAP=" + map + " -e DYNASTIO_LABEL=\"" + label + "\" -e DYNASTIO_UID=" + uid + " -e DYNASTIO_PIN_CODE=" + pin + " -p " + port + ":" + port + " -v " + basePath + "\\settings:/usr/local/bin/settings -v " + basePath + "\\data.sqlite:/usr/local/bin/data.sqlite -v " + basePath + "\\logs:/var/log -v " + wslPath + ":/usr/local/bin/maps -d n0uk/dynast.io-server-private:release";

            document.getElementById('output').innerText = command;

            if (isClick === true) {
                navigator.clipboard.writeText(command).then(function() {
                    var btn = document.querySelector('.submit-btn');
                    var oldText = btn.innerText;
                    btn.innerText = "Успешно скопировано!";
                    btn.style.backgroundColor = "#2ea043";
                    setTimeout(function() {
                        btn.innerText = oldText;
                        btn.style.backgroundColor = "";
                    }, 2000);
                }).catch(function() {
                    alert("Не удалось скопировать автоматически.");
                });
            }
        }

        window.onload = function() {
            generateCommand(false);
            var inputs = document.querySelectorAll('input');
            for (var i = 0; i < inputs.length; i++) {
                inputs[i].addEventListener('input', function() { generateCommand(false); });
            }
        };
    </script>
</body>
</html>
