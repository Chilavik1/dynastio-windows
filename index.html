<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор команды Dynast.io</title>
    <style>
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: radial-gradient(circle at center, #1b162c 0%, #0d0a16 100%); 
            color: #e2e8f0; 
            padding: 40px 20px; 
            max-width: 680px; 
            margin: 0 auto;
            min-height: 100vh;
        }
        .container {
            background: rgba(25, 20, 41, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.05);
        }
        h2 { 
            margin-top: 0;
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .form-group { 
            margin-bottom: 5px; 
        }
        .form-group.full-width {
            grid-column: span 2;
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-size: 13px;
            font-weight: 600; 
            color: #cbd5e1;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-with-btn {
            display: flex;
            gap: 10px;
        }
        input { 
            width: 100%; 
            padding: 12px 16px; 
            background: rgba(13, 10, 22, 0.8); 
            border: 1px solid rgba(147, 51, 234, 0.3); 
            color: #fff; 
            border-radius: 8px; 
            font-size: 14px;
            outline: none;
        }
        input:focus { 
            border-color: #a855f7; 
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.4);
            background: rgba(13, 10, 22, 0.9);
        }
        .browse-btn {
            background: rgba(147, 51, 234, 0.15);
            border: 1px solid rgba(147, 51, 234, 0.4);
            color: #c084fc;
            padding: 0 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 120px;
            gap: 6px;
        }
        .browse-btn:hover {
            background: rgba(147, 51, 234, 0.3);
            border-color: #a855f7;
            color: #fff;
        }
        .browse-btn .icon {
            font-size: 16px;
        }
        .submit-btn { 
            background: linear-gradient(135deg, #8b5cf6 0%, #d946ef 100%); 
            color: white; 
            padding: 14px 20px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 15px; 
            font-weight: 700;
            margin-top: 25px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
        }
        .submit-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(217, 70, 239, 0.5);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .result-box { 
            margin-top: 30px; 
            background: #07050b; 
            padding: 20px; 
            border-radius: 10px; 
            border: 1px dashed rgba(236, 72, 153, 0.4); 
            position: relative;
        }
        .result-title {
            font-size: 12px;
            font-weight: 700;
            color: #ec4899;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: block;
        }
        code { 
            word-break: break-all; 
            white-space: pre-wrap; 
            font-family: 'Consolas', 'Courier New', monospace; 
            color: #38bdf8; 
            font-size: 13px;
            line-height: 1.5;
            display: block;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .status-badge.success {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .status-badge.error {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .status-badge.info {
            background: rgba(56, 189, 248, 0.2);
            color: #38bdf8;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width { grid-column: span 1; }
            .browse-btn { min-width: 90px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📁 Luminous Generator</h2>
        <div class="subtitle">Конфигуратор строки запуска приватного сервера Dynast.io</div>

        <div class="form-grid">
            <div class="form-group full-width">
                <label for="basePath">
                    Путь к рабочей папке сервера:
                    <span id="baseStatus" class="status-badge info">⏳ ожидание</span>
                </label>
                <div class="input-with-btn">
                    <input type="text" id="basePath" value="C:\dyn_private" placeholder="Введите путь вручную">
                    <button class="browse-btn" onclick="selectFolder('basePath', 'Выберите рабочую папку сервера')">
                        <span class="icon">📂</span> Выбрать
                    </button>
                </div>
            </div>

            <div class="form-group full-width">
                <label for="wslPath">
                    Путь к папке карт WSL:
                    <span id="wslStatus" class="status-badge info">⏳ ожидание</span>
                </label>
                <div class="input-with-btn">
                    <input type="text" id="wslPath" value="\\wsl.localhost\Ubuntu\home\chlvk\dynast\maps" placeholder="Введите путь вручную">
                    <button class="browse-btn" onclick="selectFolder('wslPath', 'Выберите папку с картами')">
                        <span class="icon">📂</span> Выбрать
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="label">Название сервера (Label):</label>
                <input type="text" id="label" value="BymiNoob">
            </div>

            <div class="form-group">
                <label for="port">Сетевой порт:</label>
                <input type="number" id="port" value="800">
            </div>

            <div class="form-group">
                <label for="map">Игровая карта:</label>
                <input type="text" id="map" value="standard">
            </div>

            <div class="form-group">
                <label for="uid">Идентификатор (UID):</label>
                <input type="text" id="uid" value="google:11111111">
            </div>

            <div class="form-group full-width">
                <label for="pin">Приватный Пин-код (Pin Code):</label>
                <input type="text" id="pin" value="676-767-676">
            </div>
        </div>

        <button class="submit-btn" onclick="generateCommand(true)">📋 Скопировать команду</button>

        <div class="result-box">
            <span class="result-title">Ready Output</span>
            <code id="output">Генерация строки...</code>
        </div>
        
        <div style="margin-top: 15px; font-size: 12px; color: #64748b; text-align: center;">
            💡 Для выбора папки используйте кнопки "Выбрать" — работает в современных браузерах (Chrome, Edge, Opera)
        </div>
    </div>

    <script>
        // Функция выбора папки с использованием File System Access API
        async function selectFolder(targetId, dialogTitle) {
            const statusElement = document.getElementById(targetId + 'Status');
            const inputElement = document.getElementById(targetId);
            
            try {
                // Проверяем поддержку API
                if (!window.showDirectoryPicker) {
                    // Fallback: показываем инструкцию для ручного ввода
                    showManualInstruction(targetId);
                    return;
                }

                statusElement.textContent = '⏳ выбор...';
                statusElement.className = 'status-badge info';

                // Открываем диалог выбора папки
                const directoryHandle = await window.showDirectoryPicker();
                
                // Получаем полный путь
                let fullPath = '';
                
                // Пытаемся получить путь разными способами
                if (directoryHandle.name) {
                    // Для Windows через WSL или локальные пути
                    if (targetId === 'wslPath') {
                        // Для WSL используем путь в формате \\wsl.localhost\...
                        // Пользователь должен выбрать папку внутри WSL
                        const wslBase = '\\\\wsl.localhost\\Ubuntu\\home\\chlvk\\dynast\\';
                        fullPath = wslBase + directoryHandle.name;
                    } else {
                        // Для Windows используем путь C:\...
                        // В некоторых случаях браузер может дать доступ к реальному пути
                        try {
                            // Пытаемся получить путь через getDirectoryHandle
                            const pathParts = [];
                            let current = directoryHandle;
                            
                            // Пытаемся построить путь
                            if (directoryHandle.name) {
                                // Простой подход: используем только имя папки
                                fullPath = 'C:\\' + directoryHandle.name;
                            }
                        } catch (e) {
                            fullPath = 'C:\\' + directoryHandle.name;
                        }
                    }
                } else {
                    fullPath = directoryHandle.name || 'Выбрана папка';
                }

                // Обновляем поле ввода
                inputElement.value = fullPath;
                statusElement.textContent = '✅ выбрано';
                statusElement.className = 'status-badge success';
                
                // Обновляем команду
                generateCommand(false);
                
            } catch (error) {
                if (error.name === 'AbortError' || error.code === 20) {
                    // Пользователь отменил выбор
                    statusElement.textContent = '⏹ отменено';
                    statusElement.className = 'status-badge info';
                } else {
                    console.error('Ошибка выбора папки:', error);
                    statusElement.textContent = '❌ ошибка';
                    statusElement.className = 'status-badge error';
                    
                    // Показываем инструкцию при ошибке
                    showManualInstruction(targetId);
                }
            }
        }

        // Инструкция для ручного ввода (fallback)
        function showManualInstruction(targetId) {
            const examples = {
                'basePath': 'C:\\dyn_private',
                'wslPath': '\\\\wsl.localhost\\Ubuntu\\home\\user\\maps'
            };
            
            const messages = {
                'basePath': 'Рабочая папка сервера (Windows)',
                'wslPath': 'Папка карт в WSL'
            };
            
            alert(
                '📁 ' + messages[targetId] + '\n\n' +
                'К сожалению, ваш браузер не поддерживает выбор папки.\n' +
                'Пожалуйста, введите путь вручную в поле ввода.\n\n' +
                'Пример правильного пути:\n' + examples[targetId] + '\n\n' +
                '💡 Для WSL используйте формат: \\\\wsl.localhost\\Ubuntu\\home\\...'
            );
        }

        function generateCommand(isClick) {
            var basePath = document.getElementById('basePath').value.trim().replace(/\/$/, ""); 
            var wslPath = document.getElementById('wslPath').value.trim().replace(/\/$/, "");
            var label = document.getElementById('label').value.trim();
            var port = document.getElementById('port').value.trim();
            var map = document.getElementById('map').value.trim();
            var uid = document.getElementById('uid').value.trim();
            var pin = document.getElementById('pin').value.trim();

            if (!basePath || !wslPath || !label || !port || !map || !uid || !pin) {
                document.getElementById('output').innerText = '❌ Ошибка: заполните все поля!';
                return;
            }

            var command = "docker run --rm --name dynast -e DYNASTIO_HETWORK_MODE=host -e DYNASTIO_MAP=" + map + " -e DYNASTIO_LABEL=\"" + label + "\" -e DYNASTIO_UID=" + uid + " -e DYNASTIO_PIN_CODE=" + pin + " -p " + port + ":" + port + " -v " + basePath + "\\settings:/usr/local/bin/settings -v " + basePath + "\\data.sqlite:/usr/local/bin/data.sqlite -v " + basePath + "\\logs:/var/log -v " + wslPath + ":/usr/local/bin/maps -d n0uk/dynast.io-server-private:release";

            document.getElementById('output').innerText = command;

            if (isClick === true) {
                navigator.clipboard.writeText(command).then(function() {
                    var btn = document.querySelector('.submit-btn');
                    var oldText = btn.innerText;
                    btn.innerText = "✅ Успешно скопировано!";
                    btn.style.background = "linear-gradient(135deg, #22c55e 0%, #10b981 100%)";
                    btn.style.boxShadow = "0 6px 20px rgba(16, 185, 129, 0.4)";
                    setTimeout(function() {
                        btn.innerText = oldText;
                        btn.style.background = "";
                        btn.style.boxShadow = "";
                    }, 2000);
                }).catch(function() {
                    // Fallback для старых браузеров
                    var textArea = document.createElement('textarea');
                    textArea.value = command;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        alert('✅ Команда скопирована в буфер обмена!');
                    } catch (err) {
                        alert('❌ Не удалось скопировать автоматически. Скопируйте команду вручную.');
                    }
                    document.body.removeChild(textArea);
                });
            }
        }

        // Автогенерация при изменении полей
        window.onload = function() {
            generateCommand(false);
            var inputs = document.querySelectorAll('input');
            for (var i = 0; i < inputs.length; i++) {
                inputs[i].addEventListener('input', function() { 
                    generateCommand(false); 
                });
            }
            
            // Проверка поддержки API
            if (!window.showDirectoryPicker) {
                document.querySelectorAll('.status-badge').forEach(badge => {
                    if (badge.textContent.includes('ожидание')) {
                        badge.textContent = '⚠️ ручной ввод';
                        badge.className = 'status-badge error';
                    }
                });
            }
        };
    </script>
</body>
</html>
